<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Web3 System | Polygon Cloud</title>
    <style>
        :root { --primary: #8247e5; --bg: #0b0f1a; --card: #161b2b; --text: #f8fafc; --accent: #4ade80; --disabled: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        
        /* Animowane tło wideo */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; opacity: 0.3; filter: grayscale(50%) blur(2px);
        }

        #miniProfile { position: fixed; top: 15px; right: 20px; text-align: right; font-size: 11px; color: #94a3b8; z-index: 100; display: none; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        .u-name { color: var(--accent); font-weight: bold; font-size: 13px; display: block; margin-bottom: 2px; }
        
        .screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100%; position: absolute; transition: 0.4s; }
        .container { background: rgba(22, 27, 43, 0.9); padding: 3rem; border-radius: 2rem; text-align: center; width: 420px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        
        input { width: 100%; padding: 14px; margin: 15px 0; border-radius: 10px; border: 1px solid #2d334a; background: #0b0f1a; color: white; outline: none; box-sizing: border-box; font-size: 14px; }
        
        button { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        
        /* Przycisk nieaktywny */
        button:disabled { background: var(--disabled); cursor: not-allowed; opacity: 0.5; transform: none; box-shadow: none; }
        .btn-active { background: var(--accent) !important; color: #000 !important; box-shadow: 0 0 15px var(--accent); }

        .btn-back { position: absolute; top: 20px; left: 20px; width: auto; background: rgba(255,255,255,0.1); padding: 10px 20px; font-size: 12px; }
        .btn-disconnect { background: #ef4444 !important; font-size: 12px; margin-top: 10px; }

        .hidden { opacity: 0; pointer-events: none; transform: translateY(30px); }
        .status-msg { font-size: 13px; margin-top: 15px; min-height: 20px; color: #94a3b8; }

        #adminOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; padding: 40px; }
    </style>
</head>
<body>

    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-top-view-of-a-billiard-table-with-people-playing-34424-large.mp4" type="video/mp4">
    </video>

    <button id="adminTriggerBtn" style="position:fixed; bottom:20px; left:20px; opacity:0.3; width:auto;" onclick="toggleAdmin()">LOGI (Ctrl+F10)</button>

    <div id="miniProfile">
        <div id="miniAddress"></div>
        <div id="miniUser" class="u-name"></div>
    </div>

    <button id="globalBack" class="btn-back hidden" onclick="goBack()">← WSTECZ</button>

    <div id="step1" class="screen">
        <div class="container">
            <h1>Cloud Access</h1>
            <p style="color: #64748b;">Zautoryzuj się portfelem Polygon</p>
            <button id="btnConnect">Połącz MetaMask</button>
            <div id="log1" class="status-msg"></div>
        </div>
    </div>

    <div id="step2" class="screen hidden">
        <div class="container">
            <h1>Finalizacja profilu</h1>
            <input type="email" id="emailInput" placeholder="nazwa@poczta.pl">
            <button id="btnPay">Aktywuj konto (0.001 POL)</button>
        </div>
    </div>

    <div id="step3" class="screen hidden">
        <div class="container">
            <h1 id="welcomeUser">Witaj</h1>
            <p>System Web3 gotowy do pracy.</p>
            
            <button id="btnEnterGame" disabled>WEJDŹ DO GRY</button>
            
            <div style="margin-top: 20px; border-top: 1px solid #2d334a; pt-20">
                <button class="btn-disconnect" onclick="disconnectWallet()">ODŁĄCZ PORTFEL</button>
            </div>
        </div>
    </div>

    <div id="adminOverlay">
        <button onclick="toggleAdmin()">ZAMKNIJ</button>
        <div id="adminTableContent"></div>
    </div>

<script>
    const GITHUB_TOKEN = "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"; 
    const GIST_ID = "a1064525433ae90e4bd9bbe3ef1c9aeb";
    const TARGET_ADDR = "0x8b7f22672ddeb85566b1afecdd33b18d091dee7f";
    const FEE_HEX = "0x38D7EA4C68000"; 

    let currentWallet = null;
    let history = ['step1'];

    async function fetchDatabase() {
        try {
            const resp = await fetch(`https://api.github.com/gists/${GIST_ID}?nocache=${Date.now()}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });
            const data = await resp.json();
            return JSON.parse(data.files["database.json"].content);
        } catch (e) { return []; }
    }

    async function initConnection() {
        if (!window.ethereum) return alert("Brak MetaMask!");
        
        try {
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            currentWallet = accs[0].toLowerCase();
            const db = await fetchDatabase();
            const user = db.find(u => u.wallet === currentWallet);

            document.getElementById('miniAddress').innerText = currentWallet.substring(0,10) + "...";
            document.getElementById('miniProfile').style.display = "block";

            if (user) {
                document.getElementById('welcomeUser').innerText = `Witaj, ${user.email}`;
                showScreen('step3');
                activateGameButton(); // Aktywacja przycisku gry
            } else {
                showScreen('step2');
            }
        } catch (e) { console.error(e); }
    }

    function activateGameButton() {
        const btn = document.getElementById('btnEnterGame');
        btn.disabled = false;
        btn.classList.add('btn-active');
        btn.onclick = () => alert("Uruchamianie gry...");
    }

    function disconnectWallet() {
        currentWallet = null;
        document.getElementById('miniProfile').style.display = "none";
        const btn = document.getElementById('btnEnterGame');
        btn.disabled = true;
        btn.classList.remove('btn-active');
        showScreen('step1');
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        
        if (id !== 'step1') {
            document.getElementById('globalBack').classList.remove('hidden');
            if(history[history.length-1] !== id) history.push(id);
        } else {
            document.getElementById('globalBack').classList.add('hidden');
            history = ['step1'];
        }
    }

    function goBack() {
        if (history.length > 1) {
            history.pop();
            const prev = history[history.length - 1];
            showScreen(prev);
            history.pop(); // zapobiegamy dublowaniu w history.push wewnątrz showScreen
        }
    }

    function toggleAdmin() {
        const ov = document.getElementById('adminOverlay');
        ov.style.display = (ov.style.display === 'flex') ? 'none' : 'flex';
    }

    document.getElementById('btnConnect').onclick = initConnection;
</script>
</body>
</html>

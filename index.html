<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Billiards Pro | Enterprise System</title>
    <style>
        :root { 
            --primary: #8247e5; 
            --bg: #030712; 
            --card: rgba(17, 24, 39, 0.9); 
            --text: #f8fafc; 
            --accent: #4ade80; 
            --warning: #facc15;
        }
        
        /* Reset i baza */
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            font-family: 'Inter', sans-serif; 
            background-color: #000;
            color: var(--text); 
            overflow: hidden; 
        }

        /* NAPRAWIONE TŁO - PEŁNE WYPEŁNIENIE I PRZEŚWIT */
        #background-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('./knajpa_cartoon_bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.8; /* Prześwitywanie tła */
            animation: slowPan 25s infinite alternate ease-in-out;
        }

        @keyframes slowPan {
            from { transform: scale(1) translateX(0); }
            to { transform: scale(1.1) translateX(-10px); }
        }

        /* Ekrany i kontenery */
        .screen { 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; width: 100%; 
            position: absolute; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 10; 
        }

        .container { 
            background: var(--card); 
            padding: 3rem; 
            border-radius: 2.5rem; 
            text-align: center; 
            width: 440px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            backdrop-filter: blur(20px);
        }

        h1 { 
            margin-bottom: 0.5rem; 
            font-weight: 900; 
            background: linear-gradient(to right, #fff, var(--primary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-size: 2.5rem; 
        }

        /* Przyciski */
        button { 
            background: var(--primary); color: white; border: none; padding: 18px; 
            border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; 
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; 
            margin-bottom: 12px; font-size: 14px;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(130, 71, 229, 0.5); }
        
        .btn-guest { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.2);
            color: #ccc;
        }
        
        .btn-active { 
            background: linear-gradient(45deg, var(--accent), #22c55e) !important; 
            color: #052e16 !important; 
            box-shadow: 0 0 35px rgba(74, 222, 128, 0.6) !important;
        }

        /* Komunikat o wersji testowej */
        .warning-box {
            background: rgba(250, 204, 21, 0.1);
            color: var(--warning);
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid rgba(250, 204, 21, 0.3);
            line-height: 1.5;
            display: none;
        }

        .hidden { opacity: 0; pointer-events: none; transform: translateY(40px); }
    </style>
</head>
<body>

    <div id="background-fixed"></div>

    <audio id="arcadeMusic" loop preload="auto">
        <source src="muzykawtle.mp3" type="audio/mpeg">
    </audio>

    <div id="step1" class="screen">
        <div class="container">
            <h1>Web3 Billiards</h1>
            <p style="color:#94a3b8; margin-bottom:2rem; font-size: 14px;">Witaj w lokalnej knajpie. Wybierz jak chcesz grać.</p>
            
            <button id="btnConnect">Połącz MetaMask (Tryb PRO)</button>
            <button id="btnGuest" class="btn-guest">Graj jako Gość (DEMO)</button>
        </div>
    </div>

    <div id="step2" class="screen hidden">
        <div class="container">
            <h1 id="statusHeader">Panel Gracza</h1>
            
            <div id="guestWarning" class="warning-box">
                Grasz za darmo w wersję testową. <br>
                <strong>Podłącz portfel, jeśli chcesz grać na prawdziwe pieniądze!</strong>
            </div>

            <button id="btnStartGame" class="btn-active" onclick="launchGame()">URUCHOM ARENĘ</button>
            
            <p style="color: #666; font-size: 10px; cursor: pointer; margin-top: 10px;" onclick="location.reload()">Rozłącz i wróć</p>
        </div>
    </div>

<script>
    const music = document.getElementById('arcadeMusic');
    let isDemoMode = true;

    // Funkcja odblokowania muzyki
    function handleMusic() {
        music.volume = 0.4;
        music.play().then(() => {
            document.removeEventListener('mousedown', handleMusic);
        }).catch(e => console.log("Audio block active"));
    }
    document.addEventListener('mousedown', handleMusic);

    // Połączenie z portfelem (Tryb PRO)
    async function connectWallet() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                isDemoMode = false;
                transitionToGame();
            } catch (err) {
                alert("Połączenie przerwane.");
            }
        } else {
            alert("Nie znaleziono MetaMask! Zainstaluj dodatek, aby grać w trybie PRO.");
        }
    }

    // Wejście jako gość (Tryb DEMO)
    function enterAsGuest() {
        isDemoMode = true;
        transitionToGame();
    }

    function transitionToGame() {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        
        if (isDemoMode) {
            document.getElementById('statusHeader').innerText = "Tryb Gościa";
            document.getElementById('guestWarning').style.display = "block";
        } else {
            document.getElementById('statusHeader').innerText = "Tryb Web3";
            document.getElementById('guestWarning').style.display = "none";
        }
    }

    function launchGame() {
        const urlParams = isDemoMode ? "?mode=demo" : "?mode=pro";
        location.href = "./polyball/index.html" + urlParams;
    }

    document.getElementById('btnConnect').onclick = connectWallet;
    document.getElementById('btnGuest').onclick = enterAsGuest;
</script>
</body>
</html>

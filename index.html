<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Web3 System | Polygon Cloud</title>
    <style>
        :root { --primary: #8247e5; --bg: #0b0f1a; --card: #161b2b; --text: #f8fafc; --accent: #4ade80; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        
        #miniProfile { position: fixed; top: 15px; right: 20px; text-align: right; font-size: 11px; color: #94a3b8; z-index: 100; display: none; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        .u-name { color: var(--accent); font-weight: bold; font-size: 13px; display: block; margin-bottom: 2px; }
        .screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100%; position: absolute; transition: 0.4s; }
        .container { background: var(--card); padding: 3rem; border-radius: 2rem; text-align: center; width: 380px; border: 1px solid rgba(255,255,255,0.05); }
        
        input { width: 100%; padding: 14px; margin: 15px 0; border-radius: 10px; border: 1px solid #2d334a; background: #0b0f1a; color: white; outline: none; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; }
        button:disabled { background: #475569; cursor: not-allowed; }

        .hidden { opacity: 0; pointer-events: none; transform: translateY(30px); }
        .status-msg { font-size: 13px; margin-top: 15px; min-height: 20px; }
        .error { color: #f87171; }

        #adminOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; flex-direction: column; padding: 40px; }
        .table-wrapper { flex-grow: 1; overflow-y: auto; background: var(--card); border: 1px solid #2d334a; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1f2937; color: var(--primary); padding: 15px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px 15px; border-bottom: 1px solid #2d334a; font-size: 13px; }

        #adminTriggerBtn { position: fixed; bottom: 20px; left: 20px; z-index: 1000; padding: 10px; opacity: 0.4; font-size: 10px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 5px; cursor: pointer; }
        #adminTriggerBtn:hover { opacity: 1; color: var(--primary); }
    </style>
</head>
<body>

    <!-- Przycisk dostępu do bazy -->
    <button id="adminTriggerBtn" onclick="toggleAdmin()">BAZA DANYCH UŻYTKOWNIKÓW (Ctrl+F10)</button>

    <div id="miniProfile">
        <div id="miniAddress"></div>
        <div id="miniUser" class="u-name"></div>
        <div id="miniBalance"></div>
    </div>

    <!-- EKRAN 1: POŁĄCZENIE -->
    <div id="step1" class="screen">
        <div class="container">
            <h1>System Inicjacji</h1>
            <p>Połącz portfel Polygon (POL)</p>
            <button id="btnConnect">Połącz MetaMask</button>
            <div id="log1" class="status-msg"></div>
        </div>
    </div>

    <!-- EKRAN 2: REJESTRACJA -->
    <div id="step2" class="screen hidden">
        <div class="container">
            <h1>Powiąż Nazwę</h1>
            <input type="text" id="usernameInput" placeholder="Twoja unikalna nazwa...">
            <button id="btnPay">Zapłać i Rejestruj</button>
            <div id="log2" class="status-msg"></div>
        </div>
    </div>

    <!-- EKRAN 3: DASHBOARD -->
    <div id="step3" class="screen hidden">
        <div class="container">
            <h1 id="welcomeUser">Witaj</h1>
            <p style="color: var(--accent)">Tożsamość zweryfikowana globalnie.</p>
        </div>
    </div>

    <!-- PANEL ADMINISTRATORA -->
    <div id="adminOverlay">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
            <h2>Globalna Baza Użytkowników</h2>
            <button onclick="toggleAdmin()" style="width:auto; background:#ef4444; padding: 10px 20px;">Zamknij (Esc)</button>
        </div>
        <div id="adminLoginBox" style="text-align:center; margin-top:50px;">
            <button onclick="verifyBoss()">Weryfikuj uprawnienia administratora</button>
            <p id="adminError" class="error"></p>
        </div>
        <div id="adminTableContent" style="display:none; flex-direction:column; height:80%;">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Nr</th><th>Data Rejestracji</th><th>Portfel</th><th>Nazwa</th></tr>
                    </thead>
                    <tbody id="logTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    // --- KONFIGURACJA CHMURY ---
    const GITHUB_TOKEN = "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"; 
    const GIST_ID = "a1064525433ae90e4bd9bbe3ef1c9aeb"; 
    
    const BOSS_WALLET = "0x4baf24a37735d7a92a113fbc32b8ba42af0e9809".toLowerCase();
    const TARGET_ADDR = "0x8b7f22672ddeb85566b1afecdd33b18d091dee7f";
    const FEE_HEX = "0x38D7EA4C68000"; // 0.001 POL

    let currentWallet = null;
    let globalDatabase = [];

    // Pobieranie danych z GitHub
    async function fetchDatabase() {
        try {
            const resp = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });
            const data = await resp.json();
            globalDatabase = JSON.parse(data.files["database.json"].content);
            return globalDatabase;
        } catch (e) {
            console.error("Błąd bazy danych:", e);
            return [];
        }
    }

    // Zapisywanie danych na GitHub
    async function saveDatabase(newData) {
        try {
            const resp = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: "PATCH",
                headers: { 
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    files: { "database.json": { content: JSON.stringify(newData, null, 2) } }
                })
            });
            if (!resp.ok) throw new Error("Błąd synchronizacji");
        } catch (e) {
            alert("Błąd połączenia z chmurą!");
        }
    }

    async function initConnection() {
        if (!window.ethereum) return alert("Zainstaluj MetaMask!");
        const log = document.getElementById('log1');
        log.innerText = "Synchronizacja danych...";
        
        await fetchDatabase();

        try {
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            currentWallet = accs[0].toLowerCase();
            
            const user = globalDatabase.find(u => u.wallet.toLowerCase() === currentWallet);
            
            document.getElementById('miniAddress').innerText = currentWallet.slice(0,6) + "..." + currentWallet.slice(-4);
            document.getElementById('miniProfile').style.display = "block";

            if (user) {
                document.getElementById('welcomeUser').innerText = `Witaj, ${user.name}!`;
                showScreen('step3');
            } else {
                showScreen('step2');
            }
        } catch (e) { log.innerText = "Nie udało się połączyć portfela."; }
    }

    async function processPayment() {
        const name = document.getElementById('usernameInput').value.trim();
        const btn = document.getElementById('btnPay');
        if (name.length < 3) return alert("Nazwa musi mieć min. 3 znaki!");

        // Czy nazwa jest już w bazie?
        const exists = globalDatabase.find(u => u.name.toLowerCase() === name.toLowerCase());
        if (exists) return alert("Ta nazwa jest już zajęta!");

        btn.disabled = true;
        btn.innerText = "AUTORYZACJA PŁATNOŚCI...";

        try {
            const tx = await window.ethereum.request({
                method: 'eth_sendTransaction',
                params: [{ from: currentWallet, to: TARGET_ADDR, value: FEE_HEX }]
            });

            if (tx) {
                btn.innerText = "AKTUALIZACJA CHMURY...";
                const newUser = {
                    date: new Date().toLocaleString('pl-PL'),
                    wallet: currentWallet,
                    name: name
                };
                
                const currentDB = await fetchDatabase();
                currentDB.push(newUser);
                await saveDatabase(currentDB);
                
                alert("Sukces! Dane zsynchronizowane.");
                window.location.reload();
            }
        } catch (e) { 
            alert("Transakcja anulowana.");
            btn.disabled = false;
            btn.innerText = "ZAPŁAĆ I REJESTRUJ";
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function verifyBoss() {
        if (currentWallet === BOSS_WALLET) {
            document.getElementById('adminLoginBox').style.display = 'none';
            document.getElementById('adminTableContent').style.display = 'flex';
            
            const db = await fetchDatabase();
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = db.map((u, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${u.date}</td>
                    <td style="font-family:monospace">${u.wallet}</td>
                    <td style="color:var(--accent); font-weight:bold">${u.name}</td>
                </tr>
            `).reverse().join('');
        } else {
            document.getElementById('adminError').innerText = "BRAK UPRAWNIEŃ: Twój adres portfela nie jest zarejestrowany jako szef.";
        }
    }

    function toggleAdmin() {
        const ov = document.getElementById('adminOverlay');
        ov.style.display = (ov.style.display === 'flex') ? 'none' : 'flex';
    }

    // Obsługa klawiszy
    window.addEventListener('keydown', e => { 
        if(e.ctrlKey && e.key === 'F10') { e.preventDefault(); toggleAdmin(); } 
        if(e.key === 'Escape' && document.getElementById('adminOverlay').style.display === 'flex') toggleAdmin();
    });
    
    document.getElementById('btnConnect').onclick = initConnection;
    document.getElementById('btnPay').onclick = processPayment;

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
viewport-fit=cover,
maximum-scale=5.0,
minimum-scale=0.5,
user-scalable=yes">

<title>8 BALL ULTRA MOBILE PRO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
user-select:none;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#111;
font-family:Arial,sans-serif;
color:white;
touch-action:none;
}

/* ========================= */

body{
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* ========================= */

#zoomWrapper{

width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;

transform-origin:center center;

transition:transform .05s linear;

}

/* ========================= */

#container{

width:min(1100px,100vw);
height:100dvh;

display:flex;
flex-direction:column;
justify-content:center;

}

/* ========================= */

canvas{

width:100%;
height:auto;

max-height:72dvh;

background:#111;

border-radius:24px;

box-shadow:0 0 50px rgba(0,0,0,.85);

display:block;

touch-action:none;

}

/* ========================= */

#topbar{

display:flex;

justify-content:space-between;
align-items:center;

padding:12px;

margin-bottom:10px;

background:rgba(20,20,20,.78);

border-radius:18px;

gap:10px;

}

.player{

background:rgba(35,35,35,.65);

padding:12px;

border-radius:16px;

min-width:220px;

transition:.2s;

}

.active{

background:rgba(46,139,87,.75);

box-shadow:0 0 18px rgba(46,139,87,.5);

}

.playerName{

font-size:20px;
font-weight:bold;

}

/* ========================= */

#status{

font-size:24px;
font-weight:bold;
color:#ffd54a;
text-align:center;

}

#angleDisplay{

font-size:20px;
color:#8fffd1;
text-align:center;
margin-top:5px;

}

/* ========================= */

#controls{

position:fixed;

left:0;
right:0;

bottom:max(12px,env(safe-area-inset-bottom));

display:flex;

justify-content:center;
align-items:center;

gap:18px;

z-index:999;

pointer-events:none;

}

/* ========================= */

.ctrlBtn{

pointer-events:auto;

width:90px;
height:90px;

border-radius:50%;

display:flex;

justify-content:center;
align-items:center;

font-size:40px;
font-weight:bold;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

color:white;

backdrop-filter:blur(6px);

transition:.15s;

}

.ctrlBtn:active{

transform:scale(.94);

background:rgba(255,255,255,.15);

}

#shootBtn{

width:120px;
height:120px;

font-size:24px;

background:rgba(255,60,60,.14);

}

/* ========================= */

#powerWrap{

position:fixed;

left:50%;

transform:translateX(-50%);

bottom:145px;

width:min(420px,80vw);

height:22px;

background:rgba(255,255,255,.05);

border-radius:20px;

overflow:hidden;

border:1px solid rgba(255,255,255,.08);

z-index:999;

}

#powerBar{

width:0%;
height:100%;

background:linear-gradient(
90deg,
#00ff88,
#ffee00,
#ff3333
);

}

/* ========================= */

#menu{

position:fixed;
inset:0;

background:rgba(0,0,0,.92);

display:flex;

flex-direction:column;

justify-content:center;
align-items:center;

gap:20px;

z-index:1000;

}

.title{

font-size:54px;
font-weight:900;
text-align:center;

}

.btn{

padding:18px 40px;

background:#2e8b57;

border-radius:16px;

font-size:22px;
font-weight:bold;

cursor:pointer;

}

/* ========================= */

#mobileRotateBtn{

position:fixed;

top:12px;
left:12px;

width:58px;
height:58px;

display:none;

justify-content:center;
align-items:center;

font-size:32px;

border-radius:16px;

background:rgba(0,0,0,.68);

backdrop-filter:blur(8px);

border:1px solid rgba(255,255,255,.14);

z-index:99999;

}

/* ========================= */

#rotateOverlay{

position:fixed;
inset:0;

display:none;

justify-content:center;
align-items:center;

background:rgba(0,0,0,.95);

z-index:999999;

}

#rotateBox{

display:flex;

flex-direction:column;

align-items:center;

gap:24px;

}

#rotateIcon{

font-size:92px;

animation:rotateAnim 1.8s infinite;

}

#rotateText{

font-size:30px;
font-weight:bold;
text-align:center;

padding:0 25px;

}

@keyframes rotateAnim{

0%{
transform:rotate(0deg);
}

50%{
transform:rotate(90deg);
}

100%{
transform:rotate(0deg);
}

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:900px){

body{

padding:0;
margin:0;

overflow:hidden;

}

#container{

width:100vw;
height:100dvh;

padding-top:env(safe-area-inset-top);

padding-bottom:env(safe-area-inset-bottom);

}

canvas{

width:100vw !important;

height:auto !important;

max-height:68dvh;

border-radius:0;

}

#topbar{

margin:0;

border-radius:0;

padding-top:calc(12px + env(safe-area-inset-top));

}

#controls{

transform:scale(.82);

bottom:max(6px,env(safe-area-inset-bottom));

}

#powerWrap{

bottom:120px;

}

#mobileRotateBtn{

display:flex;

}

.player{

min-width:auto;
flex:1;

}

.playerName{

font-size:16px;

}

#status{

font-size:18px;

}

}

/* ========================= */

</style>
</head>

<body>

<div id="zoomWrapper">

<!-- ========================= -->

<div id="mobileRotateBtn">
📱
</div>

<div id="rotateOverlay">

<div id="rotateBox">

<div id="rotateIcon">
📲
</div>

<div id="rotateText">
OBRÓĆ TELEFON POZIOMO
</div>

</div>

</div>

<!-- ========================= -->

<div id="menu">

<div class="title">
8 BALL ULTRA MOBILE
</div>

<div class="btn" id="singleBtn">
1 GRACZ VS AI
</div>

<div class="btn" id="multiBtn">
2 GRACZY
</div>

</div>

<!-- ========================= -->

<div id="container">

<div id="topbar">

<div id="p1" class="player active">

<div class="playerName">
GRACZ 1
</div>

</div>

<div>

<div id="status">
ROZGRYWKA
</div>

<div id="angleDisplay">
0°
</div>

</div>

<div id="p2" class="player">

<div class="playerName">
GRACZ 2
</div>

</div>

</div>

<canvas id="game"
width="1000"
height="520"></canvas>

</div>

<!-- ========================= -->

<div id="powerWrap">
<div id="powerBar"></div>
</div>

<!-- ========================= -->

<div id="controls">

<div class="ctrlBtn" id="leftBtn">
⟲
</div>

<div class="ctrlBtn" id="shootBtn">
SHOOT
</div>

<div class="ctrlBtn" id="rightBtn">
⟳
</div>

</div>

</div>

<script>

/* ========================= */

const canvas=
document.getElementById('game');

const ctx=
canvas.getContext('2d');

/* ========================= */
/* MOBILE PINCH ZOOM */
/* ========================= */

const container =
document.getElementById('container');

let currentScale = 1;

let pinchStartDistance = 0;

let pinchStartScale = 1;

function getPinchDistance(touches){

const dx =
touches[0].clientX -
touches[1].clientX;

const dy =
touches[0].clientY -
touches[1].clientY;

return Math.hypot(dx,dy);

}

document.addEventListener(

'touchstart',

e=>{

if(e.touches.length===2){

pinchStartDistance =
getPinchDistance(e.touches);

pinchStartScale =
currentScale;

}

},

{passive:false}

);

document.addEventListener(

'touchmove',

e=>{

if(e.touches.length===2){

e.preventDefault();

const currentDistance =
getPinchDistance(e.touches);

currentScale =

pinchStartScale *

(currentDistance/pinchStartDistance);

if(currentScale<0.55)
currentScale=0.55;

if(currentScale>2.5)
currentScale=2.5;

container.style.transform =
`scale(${currentScale})`;

container.style.transformOrigin =
'center center';

}

},

{passive:false}

);

document.addEventListener(

'touchend',

e=>{

if(e.touches.length<2){

pinchStartDistance=0;

}

}

);

/* ========================= */

/* DALEJ IDZIE RESZTA TWOJEGO ORYGINALNEGO KODU */

/* ========================= */

const zoomWrapper=
document.getElementById('zoomWrapper');

let currentScale=1;
let startDistance=0;
let startScale=1;

/* ========================= */
/* PINCH ZOOM */
/* ========================= */

function getDistance(t1,t2){

const dx=t2.clientX-t1.clientX;
const dy=t2.clientY-t1.clientY;

return Math.hypot(dx,dy);

}

document.addEventListener(
'touchstart',
e=>{

if(e.touches.length===2){

startDistance=
getDistance(
e.touches[0],
e.touches[1]
);

startScale=currentScale;

}

},
{passive:false}
);

document.addEventListener(
'touchmove',
e=>{

if(e.touches.length===2){

e.preventDefault();

const newDistance=
getDistance(
e.touches[0],
e.touches[1]
);

currentScale=
Math.min(
2.5,
Math.max(
0.55,
startScale*
(newDistance/startDistance)
)
);

zoomWrapper.style.transform=
`scale(${currentScale})`;

}

},
{passive:false}
);

/* ========================= */
/* TABLE IMAGE */
/* ========================= */

const tableImg=new Image();

tableImg.src=
'./grafika/stółbilardowy.jpeg';

/* ========================= */

const powerBar=
document.getElementById('powerBar');

/* ========================= */

const CONFIG={

ballRadius:18,
pocketRadius:44,

friction:0.991,

wallLoss:0.94,

minVelocity:0.018,

maxPower:36,

elasticity:0.93

};

/* ========================= */

const TABLE={

left:74,
right:926,
top:70,
bottom:450

};

/* ========================= */

const pockets=[

{x:52,y:50},
{x:500,y:42},
{x:948,y:50},

{x:52,y:470},
{x:500,y:478},
{x:948,y:470}

];

/* ========================= */

const colors={

1:'#f1c40f',
2:'#2980b9',
3:'#e74c3c',
4:'#8e44ad',
5:'#e67e22',
6:'#27ae60',
7:'#7f8c8d',
8:'#111111',

9:'#f1c40f',
10:'#2980b9',
11:'#e74c3c',
12:'#8e44ad',
13:'#e67e22',
14:'#27ae60',
15:'#7f8c8d'

};

/* ========================= */

let balls=[];

let cueBall;

let rotateLeft=false;
let rotateRight=false;

let aimDegrees=0;
let aimAngle=0;

let charging=false;
let shotPower=0;
let powerDirection=1;

/* ========================= */

class Ball{

constructor(x,y,number){

this.x=x;
this.y=y;

this.startX=x;
this.startY=y;

this.vx=0;
this.vy=0;

this.number=number;

this.radius=CONFIG.ballRadius;

this.color=
number===0
?'white'
:colors[number];

this.pocketed=false;

}

/* ========================= */

update(){

if(this.pocketed)return;

this.x+=this.vx;
this.y+=this.vy;

this.vx*=CONFIG.friction;
this.vy*=CONFIG.friction;

if(Math.abs(this.vx)<CONFIG.minVelocity)
this.vx=0;

if(Math.abs(this.vy)<CONFIG.minVelocity)
this.vy=0;

handleWallPhysics(this);

handlePocketPhysics(this);

}

render(){

if(this.pocketed)return;

ctx.beginPath();

ctx.arc(
this.x,
this.y,
this.radius,
0,
Math.PI*2
);

ctx.fillStyle=this.color;

ctx.fill();

}

}

/* ========================= */

function handleWallPhysics(ball){

if(ball.x<TABLE.left+ball.radius){

ball.x=TABLE.left+ball.radius;

ball.vx=Math.abs(ball.vx)*0.94;

}

if(ball.x>TABLE.right-ball.radius){

ball.x=TABLE.right-ball.radius;

ball.vx=-Math.abs(ball.vx)*0.94;

}

if(ball.y<TABLE.top+ball.radius){

ball.y=TABLE.top+ball.radius;

ball.vy=Math.abs(ball.vy)*0.94;

}

if(ball.y>TABLE.bottom-ball.radius){

ball.y=TABLE.bottom-ball.radius;

ball.vy=-Math.abs(ball.vy)*0.94;

}

}

/* ========================= */

function handlePocketPhysics(ball){

for(const pocket of pockets){

const dx=
pocket.x-ball.x;

const dy=
pocket.y-ball.y;

const dist=
Math.hypot(dx,dy);

if(dist<22){

ball.pocketed=true;

if(ball.number===0){

setTimeout(()=>{

ball.pocketed=false;

ball.x=240;
ball.y=260;

},1200);

}

}

}

}

/* ========================= */

function createBalls(){

balls=[];

cueBall=
new Ball(
240,
260,
0
);

balls.push(cueBall);

const order=[

1,9,2,10,8,
3,11,4,12,
5,13,6,
14,7,
15

];

let index=0;

for(let row=0;row<5;row++){

for(let col=0;col<=row;col++){

balls.push(

new Ball(

710+row*33,
260-row*18+col*36,

order[index]

)

);

index++;

}

}

}

/* ========================= */

function drawTable(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

if(tableImg.complete){

ctx.drawImage(
tableImg,
0,
0,
canvas.width,
canvas.height
);

}

}

/* ========================= */

function renderBalls(){

for(const ball of balls){

ball.update();

ball.render();

}

}

/* ========================= */

function ballsMoving(){

return balls.some(
b=>
Math.abs(b.vx)>0||
Math.abs(b.vy)>0
);

}

/* ========================= */

function updateAim(){

if(ballsMoving())return;

const len=240;

ctx.strokeStyle=
'rgba(255,255,255,.35)';

ctx.lineWidth=5;

ctx.setLineDash([14,12]);

ctx.beginPath();

ctx.moveTo(
cueBall.x,
cueBall.y
);

ctx.lineTo(

cueBall.x+
Math.cos(aimAngle)*len,

cueBall.y+
Math.sin(aimAngle)*len

);

ctx.stroke();

ctx.setLineDash([]);

}

/* ========================= */

function updateControls(){

const rotateSpeed=.55;

if(rotateLeft){

aimDegrees-=rotateSpeed;

}

if(rotateRight){

aimDegrees+=rotateSpeed;

}

aimAngle=
aimDegrees*Math.PI/180;

document.getElementById(
'angleDisplay'
).textContent=
Math.round(aimDegrees)+'°';

if(charging){

shotPower+=
0.58*powerDirection;

if(
shotPower>=CONFIG.maxPower
){

shotPower=
CONFIG.maxPower;

powerDirection=-1;

}

if(shotPower<=0){

shotPower=0;

powerDirection=1;

}

powerBar.style.width=
(
shotPower/
CONFIG.maxPower
*100
)+'%';

}

}

/* ========================= */

function shoot(){

if(ballsMoving())return;

const power=
Math.max(
2,
shotPower*.72
);

cueBall.vx=
Math.cos(aimAngle)*power;

cueBall.vy=
Math.sin(aimAngle)*power;

shotPower=0;

powerBar.style.width='0%';

}

/* ========================= */

function gameLoop(){

updateControls();

drawTable();

renderBalls();

updateAim();

requestAnimationFrame(
gameLoop
);

}

/* ========================= */

function holdButton(btn,start,end){

btn.addEventListener(
'touchstart',
e=>{
e.preventDefault();
start();
}
);

btn.addEventListener(
'touchend',
e=>{
e.preventDefault();
end();
}
);

btn.addEventListener(
'mousedown',
start
);

window.addEventListener(
'mouseup',
end
);

}

/* ========================= */

holdButton(

document.getElementById(
'leftBtn'
),

()=>rotateLeft=true,

()=>rotateLeft=false

);

/* ========================= */

holdButton(

document.getElementById(
'rightBtn'
),

()=>rotateRight=true,

()=>rotateRight=false

);

/* ========================= */

const shootBtn=
document.getElementById(
'shootBtn'
);

/* ========================= */

shootBtn.addEventListener(
'touchstart',
e=>{

e.preventDefault();

if(ballsMoving())return;

charging=true;

shotPower=0;

powerDirection=1;

}
);

shootBtn.addEventListener(
'touchend',
e=>{

e.preventDefault();

charging=false;

shoot();

}
);

/* ========================= */

window.addEventListener(
'mouseup',
()=>{

if(charging){

charging=false;

shoot();

}

}
);

/* ========================= */

function checkLandscape(){

const mobile=
window.innerWidth<900;

const landscape=
window.innerWidth>
window.innerHeight;

document.getElementById(
'rotateOverlay'
).style.display=
(
mobile&&!landscape
)
?'flex':'none';

}

window.addEventListener(
'resize',
checkLandscape
);

window.addEventListener(
'orientationchange',
()=>{

setTimeout(
checkLandscape,
300
);

}
);

checkLandscape();

/* ========================= */

createBalls();

requestAnimationFrame(
gameLoop
);

/* ========================= */

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Realtime Chat Room</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #151d30;
            --accent-color: #00ffcc;
            --text-color: #f3f4f6;
            --text-muted: #6b7280;
            --border-color: #24324f;
            --error-color: #ff4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Ekran Logowania / Rejestracji */
        .auth-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .auth-container h2 {
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--accent-color);
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .auth-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 0.5rem;
        }

        .auth-btn:hover {
            opacity: 0.9;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-toggle span {
            color: var(--accent-color);
            cursor: pointer;
            text-decoration: underline;
        }

        .error-msg {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }

        /* Główny Panel Czatu */
        .chat-interface {
            display: none;
            width: 95vw;
            max-width: 1100px;
            height: 85vh;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        .chat-header {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--error-color);
            color: var(--error-color);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--error-color);
            color: white;
        }

        .chat-body {
            display: flex;
            height: calc(100% - 60px);
            position: relative;
        }

        .messages-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.1);
        }

        .messages-container {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            background: var(--border-color);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            max-width: 75%;
            align-self: flex-start;
        }

        .message.own {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid var(--accent-color);
            align-self: flex-end;
        }

        .message.system {
            background: transparent;
            color: var(--accent-color);
            font-size: 0.85rem;
            align-self: center;
            text-align: center;
            border: none;
            padding: 0.2rem;
        }

        .message .meta {
            font-size: 0.75rem;
            color: var(--accent-color);
            margin-bottom: 0.25rem;
            font-weight: bold;
        }

        .message .text {
            font-size: 0.95rem;
            word-break: break-word;
        }

        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .send-btn {
            padding: 0 1.5rem;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Panel użytkowników online */
        .users-window {
            width: 280px;
            border-left: 1px solid var(--border-color);
            background: rgba(21, 29, 48, 0.85);
            display: flex;
            flex-direction: column;
        }

        .users-window-header {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.15);
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .online-count {
            background: var(--accent-color);
            color: var(--bg-color);
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.5rem;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="auth-container" id="authBox">
        <h2 id="authTitle">Utwórz Konto</h2>
        <form id="authForm">
            <div class="form-group" id="emailGroup">
                <label for="emailInput">Adres E-mail</label>
                <input type="email" id="emailInput" required placeholder="np. twoj@email.com">
            </div>
            <div class="form-group">
                <label for="userInput">Nazwa użytkownika (Nick)</label>
                <input type="text" id="userInput" required placeholder="np. Satoshi99">
            </div>
            <div class="form-group">
                <label for="passInput">Hasło</label>
                <input type="password" id="passInput" required placeholder="••••••••">
            </div>
            <button type="submit" class="auth-btn" id="authSubmitBtn">Zarejestruj się</button>
            <div class="error-msg" id="authError">Błąd autoryzacji.</div>
        </form>
        <div class="auth-toggle">
            <span id="toggleAuthText">Masz już konto? Zaloguj się</span>
        </div>
    </div>

    <div class="chat-interface" id="chatInterface">
        <div class="chat-header">
            <h1># Global Realtime DevRoom</h1>
            <div class="user-profile">
                <span id="currentUserDisplay" style="font-weight: bold;"></span>
                <button class="logout-btn" id="logoutBtn">Wyloguj</button>
            </div>
        </div>
        
        <div class="chat-body">
            <div class="messages-area">
                <div class="messages-container" id="messagesContainer"></div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Napisz wiadomość...">
                    <button class="send-btn" id="sendBtn">Wyślij</button>
                </div>
            </div>

            <div class="users-window" id="usersWindow">
                <div class="users-window-header">
                    <span>Użytkownicy Online</span>
                    <span class="online-count" id="onlineCount">0</span>
                </div>
                <div class="users-list" id="usersList"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onChildAdded, onValue, remove, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // TUTAJ WKLEJ SWOJE DANE Z KROKU 1:
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyBx1DftUTvzQIkgJqwIMDWo-snk7YwlE4Q",
  authDomain: "selementchat.firebaseapp.com",
  databaseURL: "https://selementchat-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "selementchat",
  storageBucket: "selementchat.firebasestorage.app",
  messagingSenderId: "277474489738",
  appId: "1:277474489738:web:74a74d9b63890d21e78473"
};0

        // Inicjalizacja bazy
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isLoginMode = false;
        let currentUser = null;
        let myOnlineRef = null;

        // Elementy DOM
        const authForm = document.getElementById('authForm');
        const toggleAuthText = document.getElementById('toggleAuthText');
        const authTitle = document.getElementById('authTitle');
        const emailGroup = document.getElementById('emailGroup');
        const emailInput = document.getElementById('emailInput');
        const authSubmitBtn = document.getElementById('authSubmitBtn');
        const authError = document.getElementById('authError');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        // Przełączanie trybu logowanie/rejestracja
        toggleAuthText.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authError.style.display = 'none';
            if (isLoginMode) {
                authTitle.innerText = "Logowanie";
                emailGroup.style.display = "none";
                emailInput.removeAttribute('required');
                authSubmitBtn.innerText = "Zaloguj się";
                toggleAuthText.innerHTML = "Nie masz konta? <span>Zarejestruj się</span>";
            } else {
                authTitle.innerText = "Utwórz Konto";
                emailGroup.style.display = "block";
                emailInput.setAttribute('required', 'required');
                authSubmitBtn.innerText = "Zarejestruj się";
                toggleAuthText.innerHTML = "Masz już konto? <span>Zaloguj się</span>";
            }
        });

        // Obsługa Rejestracji / Logowania
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('userInput').value.trim();
            const password = document.getElementById('passInput').value;
            const email = document.getElementById('emailInput').value.trim();

            if (!isLoginMode) {
                // Sprawdzamy czy użytkownik istnieje w bazie Firebase
                onValue(ref(db, 'users/' + username), (snapshot) => {
                    if (snapshot.exists()) {
                        showError("Ta nazwa użytkownika jest zajęta.");
                    } else {
                        // Rejestracja - zapis do globalnej bazy danych Firebase
                        set(ref(db, 'users/' + username), { email, password })
                        .then(() => {
                            currentUser = username;
                            enterChat();
                        });
                    }
                }, { onlyOnce: true });
            } else {
                // Logowanie ze sprawdzeniem w Firebase
                onValue(ref(db, 'users/' + username), (snapshot) => {
                    if (snapshot.exists() && snapshot.val().password === password) {
                        currentUser = username;
                        enterChat();
                    } else {
                        showError("Nieprawidłowy login lub hasło.");
                    }
                }, { onlyOnce: true });
            }
        });

        function showError(text) {
            authError.innerText = text;
            authError.style.display = 'block';
        }

        function enterChat() {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('chatInterface').style.display = 'flex';
            document.getElementById('currentUserDisplay').innerText = `@${currentUser}`;
            authForm.reset();

            // 1. Oznaczamy siebie jako ONLINE w Firebase
            myOnlineRef = ref(db, 'online/' + currentUser);
            set(myOnlineRef, true);

            // Gdy użytkownik zamknie kartę/przeglądarkę, automatycznie usuń go z online (funkcja Firebase)
            // Na darmowych hostingach statycznych działa to po pełnym rozłączeniu sesji websocket
            window.addEventListener('beforeunload', () => remove(myOnlineRef));

            // 2. Słuchaj nowych wiadomości w czasie rzeczywistym
            listenForMessages();

            // 3. Słuchaj zmian na liście użytkowników online
            listenForOnlineUsers();
        }

        // Wysyłanie wiadomości do Firebase
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            const messagesRef = ref(db, 'messages');
            push(messagesRef, {
                user: currentUser,
                text: text,
                timestamp: Date.now()
            });
            messageInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // Słuchanie wiadomości (uruchamia się automatycznie u każdego podłączonego użytkownika!)
        function listenForMessages() {
            const messagesRef = ref(db, 'messages');
            const container = document.getElementById('messagesContainer');
            container.innerHTML = ''; // czyszczenie

            onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val();
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';
                if (data.user === currentUser) messageDiv.classList.add('own');

                messageDiv.innerHTML = `
                    <div class="meta">${data.user}</div>
                    <div class="text">${escapeHTML(data.text)}</div>
                `;
                container.appendChild(messageDiv);
                container.scrollTop = container.scrollHeight;
            });
        }

        // Słuchanie listy użytkowników online
        function listenForOnlineUsers() {
            const onlineRef = ref(db, 'online');
            const usersListContainer = document.getElementById('usersList');
            const onlineCount = document.getElementById('onlineCount');

            onValue(onlineRef, (snapshot) => {
                usersListContainer.innerHTML = '';
                if (!snapshot.exists()) {
                    onlineCount.innerText = "0";
                    return;
                }

                const users = Object.keys(snapshot.val());
                onlineCount.innerText = users.length;

                users.forEach(user => {
                    const userItem = document.createElement('div');
                    userItem.className = 'user-item';
                    userItem.innerHTML = `
                        <div class="status-dot"></div>
                        <span>${user} ${user === currentUser ? '(Ty)' : ''}</span>
                    `;
                    usersListContainer.appendChild(userItem);
                });
            });
        }

        // Wylogowanie
        logoutBtn.addEventListener('click', () => {
            if (myOnlineRef) remove(myOnlineRef);
            // Wyłączamy nasłuchiwanie bazy danych przed wyjściem
            off(ref(db, 'messages'));
            off(ref(db, 'online'));
            
            currentUser = null;
            document.getElementById('chatInterface').style.display = 'none';
            document.getElementById('authBox').style.display = 'block';
        });

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
